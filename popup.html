<!DOCTYPE html>
<html>
<body style="font-family:sans-serif; padding:10px; min-width:220px;">
  <meta charset="utf-8">
  <h3>🐱 Focus Cat</h3>

  <button id="toggle" style="width:100%; border:none; color:#fff; padding:8px 10px; border-radius:6px; cursor:pointer; margin-bottom:10px;"></button>

  <p id="time"></p>
  <hr style="margin:10px 0;">
  <label for="fullFocusMinutes">Полный фокус (мин):</label>
  <input id="fullFocusMinutes" type="number" min="1" step="1" style="width:100%; margin:6px 0; box-sizing:border-box;" />
  <button id="fullFocusToggle" style="width:100%; border:none; color:#fff; padding:8px 10px; border-radius:6px; cursor:pointer; margin-bottom:8px;"></button>
  <p id="fullFocusStatus" style="margin:0 0 10px;"></p>
  <a href="options.html" target="_blank">Настройки</a>

  <script src="popup.js"></script>
</body>
</html>
